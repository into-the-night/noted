<!doctype html>
<html lang="en" data-theme="light" data-palette="ember" data-font="geist" data-bg="plain" data-radius="soft">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Noted — Study Workspace · v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Serif:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ─────────────────────────────────────────────────────────────
     DEFAULT TOKENS
     - Mode (theme) sets neutrals
     - Palette layers in accent
     - Font swaps the type system
     - Bg swaps the surface treatment
     ───────────────────────────────────────────────────────────── */
  :root {
    --font-sans:    'Geist', ui-sans-serif, -apple-system, system-ui, sans-serif;
    --font-mono:    'Geist Mono', ui-monospace, 'SF Mono', monospace;
    --font-display: 'Geist', ui-sans-serif, system-ui, sans-serif;
    --display-weight: 600;
    --display-tracking: -0.025em;
    --display-line: 1.05;

    --r-sm: 4px; --r-md: 7px; --r-lg: 12px;

    --shadow-sm: 0 1px 2px rgba(10, 10, 10, 0.04);
    --shadow-md: 0 6px 24px -8px rgba(10, 10, 10, 0.10);
    --shadow-lg: 0 24px 64px -16px rgba(10, 10, 10, 0.22);
  }

  /* MODE — light (default) */
  [data-theme="light"] {
    --bg:           #F6F6F4;
    --panel:        #FFFFFF;
    --panel-2:      #F1F1EE;
    --panel-sunk:   #EBEBE7;
    --border:       #E2E2DD;
    --border-soft:  #ECECE7;
    --ink:          #0A0A0A;
    --ink-soft:     #2A2A2A;
    --muted:        #6B6B66;
    --muted-2:      #A8A8A2;
    --gold:         #B8881E;
    --grid-line:    rgba(10, 10, 10, 0.045);
    --dot:          rgba(10, 10, 10, 0.055);
    --hair-line:    rgba(10, 10, 10, 0.06);
  }

  [data-theme="dark"] {
    --bg:           #0B0B0D;
    --panel:        #141417;
    --panel-2:      #1A1A1E;
    --panel-sunk:   #222227;
    --border:       #2A2A2E;
    --border-soft:  #1F1F22;
    --ink:          #FAFAF8;
    --ink-soft:     #D4D4D0;
    --muted:        #8A8A85;
    --muted-2:      #56565A;
    --gold:         #E4B547;
    --grid-line:    rgba(255, 255, 255, 0.045);
    --dot:          rgba(255, 255, 255, 0.05);
    --hair-line:    rgba(255, 255, 255, 0.06);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
    --shadow-md: 0 6px 24px -8px rgba(0, 0, 0, 0.6);
    --shadow-lg: 0 24px 64px -16px rgba(0, 0, 0, 0.8);
  }

  [data-theme="reading"] {
    --bg:           #F1E7D2;
    --panel:        #F8EFDC;
    --panel-2:      #EBE0C7;
    --panel-sunk:   #E2D6B9;
    --border:       #D6C9A8;
    --border-soft:  #E2D6B9;
    --ink:          #2A2017;
    --ink-soft:     #4B3D2C;
    --muted:        #7A6A52;
    --muted-2:      #B0A287;
    --gold:         #9B7818;
    --grid-line:    rgba(42, 32, 23, 0.07);
    --dot:          rgba(42, 32, 23, 0.08);
    --hair-line:    rgba(42, 32, 23, 0.09);
    --shadow-sm: 0 1px 2px rgba(42, 32, 23, 0.05);
    --shadow-md: 0 6px 24px -8px rgba(42, 32, 23, 0.12);
    --shadow-lg: 0 24px 64px -16px rgba(42, 32, 23, 0.24);
  }

  /* ─────────────────────────────────────────────────────────────
     PALETTES — accent overlays
     ───────────────────────────────────────────────────────────── */
  [data-palette="ember"] {
    --accent: #C2410C; --accent-hov: #9A2D08;
    --accent-soft: rgba(194, 65, 12, 0.18);
    --accent-tint: rgba(194, 65, 12, 0.08);
    --accent-fg: #FFFFFF;
  }
  [data-theme="dark"][data-palette="ember"] {
    --accent: #FB923C; --accent-hov: #FDBA74;
    --accent-soft: rgba(251, 146, 60, 0.22);
    --accent-tint: rgba(251, 146, 60, 0.10);
    --accent-fg: #0B0B0D;
  }
  [data-theme="reading"][data-palette="ember"] {
    --accent: #B8470A; --accent-hov: #8F3508;
    --accent-soft: rgba(184, 71, 10, 0.20);
    --accent-tint: rgba(184, 71, 10, 0.10);
    --accent-fg: #F8EFDC;
  }

  [data-palette="graphite"] {
    --accent: #18181B; --accent-hov: #000000;
    --accent-soft: rgba(24, 24, 27, 0.16);
    --accent-tint: rgba(24, 24, 27, 0.06);
    --accent-fg: #FAFAF8;
  }
  [data-theme="dark"][data-palette="graphite"] {
    --accent: #FAFAF8; --accent-hov: #FFFFFF;
    --accent-soft: rgba(250, 250, 248, 0.18);
    --accent-tint: rgba(250, 250, 248, 0.06);
    --accent-fg: #0B0B0D;
  }
  [data-theme="reading"][data-palette="graphite"] {
    --accent: #2A2017; --accent-hov: #1A1208;
    --accent-soft: rgba(42, 32, 23, 0.16);
    --accent-tint: rgba(42, 32, 23, 0.07);
    --accent-fg: #F8EFDC;
  }

  [data-palette="forest"] {
    --accent: #2F6B49; --accent-hov: #1F4F33;
    --accent-soft: rgba(47, 107, 73, 0.18);
    --accent-tint: rgba(47, 107, 73, 0.08);
    --accent-fg: #FFFFFF;
  }
  [data-theme="dark"][data-palette="forest"] {
    --accent: #6AC28D; --accent-hov: #8AD2A6;
    --accent-soft: rgba(106, 194, 141, 0.22);
    --accent-tint: rgba(106, 194, 141, 0.10);
    --accent-fg: #0B0B0D;
  }
  [data-theme="reading"][data-palette="forest"] {
    --accent: #2F6B49; --accent-hov: #1F4F33;
    --accent-soft: rgba(47, 107, 73, 0.20);
    --accent-tint: rgba(47, 107, 73, 0.10);
    --accent-fg: #F8EFDC;
  }

  [data-palette="indigo"] {
    --accent: #3A3A8A; --accent-hov: #2A2A6A;
    --accent-soft: rgba(58, 58, 138, 0.18);
    --accent-tint: rgba(58, 58, 138, 0.08);
    --accent-fg: #FFFFFF;
  }
  [data-theme="dark"][data-palette="indigo"] {
    --accent: #8A8AE0; --accent-hov: #ABABFC;
    --accent-soft: rgba(138, 138, 224, 0.22);
    --accent-tint: rgba(138, 138, 224, 0.10);
    --accent-fg: #0B0B0D;
  }
  [data-theme="reading"][data-palette="indigo"] {
    --accent: #3A3A8A; --accent-hov: #2A2A6A;
    --accent-soft: rgba(58, 58, 138, 0.20);
    --accent-tint: rgba(58, 58, 138, 0.10);
    --accent-fg: #F8EFDC;
  }

  [data-palette="plum"] {
    --accent: #831843; --accent-hov: #641032;
    --accent-soft: rgba(131, 24, 67, 0.18);
    --accent-tint: rgba(131, 24, 67, 0.08);
    --accent-fg: #FFFFFF;
  }
  [data-theme="dark"][data-palette="plum"] {
    --accent: #E879A6; --accent-hov: #F0A4C2;
    --accent-soft: rgba(232, 121, 166, 0.22);
    --accent-tint: rgba(232, 121, 166, 0.10);
    --accent-fg: #0B0B0D;
  }
  [data-theme="reading"][data-palette="plum"] {
    --accent: #831843; --accent-hov: #641032;
    --accent-soft: rgba(131, 24, 67, 0.20);
    --accent-tint: rgba(131, 24, 67, 0.10);
    --accent-fg: #F8EFDC;
  }

  /* ─────────────────────────────────────────────────────────────
     TYPE SYSTEMS
     ───────────────────────────────────────────────────────────── */
  [data-font="geist"] {
    --font-sans:    'Geist', ui-sans-serif, system-ui, sans-serif;
    --font-mono:    'Geist Mono', ui-monospace, monospace;
    --font-display: 'Geist', ui-sans-serif, sans-serif;
    --display-weight: 600;
    --display-tracking: -0.025em;
    --display-line: 1.05;
  }
  [data-font="editorial"] {
    --font-sans:    'Geist', ui-sans-serif, system-ui, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, monospace;
    --font-display: 'Instrument Serif', Georgia, serif;
    --display-weight: 400;
    --display-tracking: -0.012em;
    --display-line: 1.02;
  }
  [data-font="plex"] {
    --font-sans:    'IBM Plex Sans', ui-sans-serif, sans-serif;
    --font-mono:    'IBM Plex Mono', ui-monospace, monospace;
    --font-display: 'IBM Plex Serif', Georgia, serif;
    --display-weight: 500;
    --display-tracking: -0.018em;
    --display-line: 1.08;
  }
  [data-font="literary"] {
    --font-sans:    'Geist', ui-sans-serif, sans-serif;
    --font-mono:    'JetBrains Mono', ui-monospace, monospace;
    --font-display: 'Newsreader', Georgia, serif;
    --display-weight: 500;
    --display-tracking: -0.022em;
    --display-line: 1.06;
  }
  [data-font="mono"] {
    --font-sans:    'Geist Mono', ui-monospace, monospace;
    --font-mono:    'Geist Mono', ui-monospace, monospace;
    --font-display: 'Geist Mono', ui-monospace, monospace;
    --display-weight: 500;
    --display-tracking: -0.03em;
    --display-line: 1.05;
  }

  /* ─────────────────────────────────────────────────────────────
     CORNER RADIUS (reserved for future use)
     ───────────────────────────────────────────────────────────── */
  [data-radius="sharp"] { --r-sm: 1px; --r-md: 2px; --r-lg: 3px; }
  [data-radius="soft"]  { --r-sm: 4px; --r-md: 7px; --r-lg: 12px; }

  /* ─────────────────────────────────────────────────────────────
     BASE
     ───────────────────────────────────────────────────────────── */
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    transition: background-color 200ms ease, color 200ms ease;
  }
  #root { height: 100vh; width: 100vw; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(107, 107, 102, 0.25); border-radius: 6px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(107, 107, 102, 0.45); border: 2px solid transparent; background-clip: content-box; }

  /* mono overrides — covers both .mono and the shell's inline 'Geist Mono' styles */
  .mono,
  [style*="Geist Mono"] { font-family: var(--font-mono) !important; }

  /* display font for big titles — h1 only (h2 stays in sans for tighter editorial feel) */
  h1 {
    font-family: var(--font-display);
    font-weight: var(--display-weight);
    letter-spacing: var(--display-tracking);
    line-height: var(--display-line);
  }
  /* Editorial + Literary lean serif on h2 too — but keeps weight/tracking */
  [data-font="editorial"] h2,
  [data-font="literary"] h2 {
    font-family: var(--font-display);
    font-weight: 500;
    letter-spacing: -0.012em;
  }

  kbd {
    font-family: var(--font-mono);
    font-size: 10.5px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-bottom-width: 1.5px;
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--ink-soft);
  }

  .stripes {
    background-image: repeating-linear-gradient(135deg,
      rgba(10,10,10,0.04) 0,
      rgba(10,10,10,0.04) 1px,
      transparent 1px,
      transparent 8px);
  }

  /* ─────────────────────────────────────────────────────────────
     BACKGROUND TREATMENTS — applied directly to <body>.
     ───────────────────────────────────────────────────────────── */
  [data-bg="plain"] body {
    background-color: var(--bg);
    background-image: none;
  }
  [data-bg="paper"] body {
    background-color: var(--bg);
    background-image: radial-gradient(circle at 1px 1px, var(--dot) 1px, transparent 1.4px);
    background-size: 6px 6px;
    background-attachment: fixed;
  }
  [data-bg="grid"] body {
    background-color: var(--bg);
    background-image:
      linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
    background-size: 36px 36px;
    background-attachment: fixed;
  }
  [data-bg="warm"] body {
    background:
      radial-gradient(ellipse 80% 60% at 15% 0%, var(--accent-tint) 0%, transparent 55%),
      radial-gradient(ellipse 70% 60% at 95% 100%, var(--accent-tint) 0%, transparent 60%),
      var(--bg) fixed;
  }
  [data-bg="hairline"] body {
    background-color: var(--bg);
    background-image: repeating-linear-gradient(
      0deg,
      var(--hair-line) 0px, var(--hair-line) 1px,
      transparent 1px, transparent 8px
    );
    background-attachment: fixed;
  }

  /* Page entrance */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }
  .view-fade { animation: fadeIn 220ms ease both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="noted-shell.jsx"></script>
<script type="text/babel" src="noted-app-v2.jsx"></script>
</body>
</html>
